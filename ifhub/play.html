<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Interactive Fiction</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="lib/parchment/parchment.css">
<link rel="stylesheet" href="lib/parchment/main.css">

<style>
:root {
  /* ── AsyncGlk / GlkOte base theme ── */
  --glkote-buffer-bg: #111;
  --glkote-buffer-fg: #d4c5a9;
  --glkote-buffer-reverse-bg: #d4c5a9;
  --glkote-buffer-reverse-fg: #111;
  --glkote-buffer-size: 16px;
  --glkote-buffer-line-height: 1.6;
  --glkote-grid-bg: #1c1810;
  --glkote-grid-fg: #aa9966;
  --glkote-grid-reverse-bg: #aa9966;
  --glkote-grid-reverse-fg: #1c1810;
  --glkote-grid-size: 14px;
  --glkote-input-fg: #e8d090;
  --glkote-error-border: #882020;
  --glkote-warning-border: #3333aa;
  --glkote-prop-family: "Iowan Old Style", Palatino, Georgia, "Times New Roman", serif;
  --glkote-mono-family: "SF Mono", "Fira Code", "Cascadia Code", Consolas, "Courier New", monospace;
  --glkote-grid-mono-family: var(--glkote-mono-family);

  --asyncglk-ui-bg: #1a1810;
  --asyncglk-ui-border: #3a2a10;
  --asyncglk-ui-fg: #d4c5a9;
  --asyncglk-ui-selected: #2a2010;
  --asyncglk-ui-textbox: #111;
}

html, body {
  height: 100%;
  margin: 0;
  padding: 0;
  background: #0a0a0a;
  overflow: hidden;
}

div#gameport {
  position: absolute;
  inset: 0;
  background: #111;
}

.WindowFrame {
  background: #111;
}

.GridWindow {
  background-color: #1c1810;
  color: #aa9966;
  padding: 6px 12px;
}

.BufferWindow {
  background-color: #111;
  color: #d4c5a9;
  scrollbar-width: thin;
  scrollbar-color: #3a3020 transparent;
}

.BufferWindowInner {
  padding: 20px 40px;
  text-rendering: optimizeLegibility;
}

.Input {
  font-weight: bold;
  color: #e8d090;
  caret-color: #e8d090;
  caret-shape: underscore;
}

.Style_user1 { display: none; }

.Style_header {
  color: #e8d8b0;
  text-shadow: 0 0 8px rgba(232,216,176,0.15);
}

.Style_alert {
  color: #cc8844;
  text-shadow: 0 0 6px rgba(204,136,68,0.12);
}

.Style_note {
  color: #aa9966;
}

/* ── Scrollbar polish ── */
.BufferWindow::-webkit-scrollbar { width: 6px; }
.BufferWindow::-webkit-scrollbar-track { background: transparent; }
.BufferWindow::-webkit-scrollbar-thumb { background: #3a3020; border-radius: 3px; }
.BufferWindow::-webkit-scrollbar-thumb:hover { background: #5a4a30; }

/* ── Text fade-in ── */
@keyframes bufferFadeIn {
  from { opacity: 0; transform: translateY(4px); }
  to   { opacity: 1; transform: translateY(0); }
}
.BufferLine { animation: bufferFadeIn 0.3s ease-out; }

#loadingpane {
  position: absolute;
  width: 100%;
  text-align: center;
  top: 35%;
  color: #887755;
  font-size: 1.2em;
  font-family: Georgia, "Times New Roman", serif;
}

@keyframes pulse {
  0%, 100% { opacity: 0.4; }
  50% { opacity: 1; }
}

#loadingpane em {
  animation: pulse 1.5s ease-in-out infinite;
}

</style>
<script src="themes.js"></script>
<script>initTheme('game');</script>

<script src="lib/parchment/jquery.min.js"></script>
<script>
    var params = new URLSearchParams(window.location.search);
    var binaryPath = params.get('binary');
    var gameTitle = params.get('title') || 'Interactive Fiction';

    document.title = gameTitle;

    if (binaryPath) {
        // story_name is REQUIRED — parchment.js calls .substring() on it to detect
        // the file type (.ulx.js, .gblorb.js, .z3.js). Without it you get:
        //   TypeError: Cannot read properties of undefined (reading 'substring')
        parchment_options = {
            default_story: [binaryPath],
            lib_path: 'lib/parchment/',
            story_name: binaryPath.split('/').pop(),
            use_proxy: 0,
            do_vm_autosave: 1,
        };
    }
</script>
<script src="lib/parchment/parchment.js"></script>
<script src="lib/parchment/resourcemap.js"></script>
<script>
    window.addEventListener('pageshow', function(e) {
        if (e.persisted) { window.location.reload(); }
    });
</script>

</head>
<body>

<div id="gameport">
  <div id="windowport">
    <noscript>
      <div style="text-align:center; padding:40px; color:#aa6644;">
        <h2>Interactive Fiction</h2>
        <p>JavaScript is required to play this game.</p>
      </div>
    </noscript>
  </div>
  <div id="loadingpane">
    <div id="loading-title" style="margin-bottom:20px; font-size:1.4em; color:#aa9966; letter-spacing:4px;"></div>
    <em>Loading...</em>
  </div>
  <div id="errorpane" style="display:none;">
    <div id="errorcontent">...</div>
  </div>
</div>

<script>
  document.getElementById('loading-title').textContent = gameTitle;
</script>

<script>
/* Theme listener for hub iframe embedding */
(function() {
  function ensureRetroFonts() {
    if (document.getElementById('retro-platform-fonts')) return;
    var link = document.createElement('link');
    link.id = 'retro-platform-fonts';
    link.rel = 'stylesheet';
    link.href = 'https://fonts.googleapis.com/css2?family=Pixelify+Sans&family=Press+Start+2P&family=Silkscreen&family=Sixtyfour&family=Tiny5&family=VT323&family=Workbench&display=swap';
    document.head.appendChild(link);
  }

  function applyPlatformTheme(g, sb) {
    ensureRetroFonts();
    var el = document.getElementById('platform-theme-override');
    if (el) el.remove();
    var style = document.createElement('style');
    style.id = 'platform-theme-override';
    style.textContent =
      'body, html { background: ' + g.bodyBg + ' !important; }\n' +
      '.BufferWindow { color: ' + g.bufferFg + ' !important; background-color: ' + g.bufferBg + ' !important; font-family: ' + g.monoFamily + ' !important; font-size: ' + g.bufferSize + ' !important; line-height: ' + g.bufferLineHeight + ' !important; }\n' +
      '.BufferWindow span { color: ' + g.bufferFg + ' !important; }\n' +
      '.BufferWindow span.reverse { color: ' + g.bufferBg + ' !important; background-color: ' + g.bufferFg + ' !important; }\n' +
      '.BufferWindow .Style_input { color: ' + g.inputFg + ' !important; }\n' +
      '.BufferWindow .Style_emphasized { color: ' + g.emphFg + ' !important; }\n' +
      '.BufferWindow .Style_header { color: ' + g.headerFg + ' !important; }\n' +
      '.BufferWindow .Style_subheader,\n' +
      '.BufferWindow .Style_alert { color: ' + g.headerFg + ' !important; }\n' +
      '.BufferWindow .Input,\n' +
      '.BufferWindow textarea.Input { color: ' + g.inputFg + ' !important; caret-color: ' + g.inputFg + '; font-family: ' + g.monoFamily + ' !important; }\n' +
      '.GridWindow { color: ' + g.gridFg + ' !important; background-color: ' + g.gridBg + ' !important; font-family: ' + g.monoFamily + ' !important; font-size: ' + g.gridSize + ' !important; line-height: ' + g.gridLineHeight + ' !important; padding: 4px 12px !important; border: none !important; border-radius: 0 !important; box-shadow: none !important; margin: 0 !important; width: 100% !important; box-sizing: border-box !important; }\n' +
      '.GridWindow span { color: ' + g.gridFg + ' !important; background-color: ' + g.gridBg + ' !important; }\n' +
      '.GridWindow span.reverse { color: ' + g.gridFg + ' !important; background-color: ' + g.gridBg + ' !important; }\n' +
      '#loadingpane { color: ' + g.bufferFg + '; background: ' + g.bodyBg + '; font-family: ' + g.monoFamily + '; }\n' +
      '.WindowFrame { background: transparent !important; }\n' +
      'div#gameport { background: linear-gradient(to bottom, ' + g.gridBg + ' 0px, ' + g.gridBg + ' ' + ((parseInt(g.gridLineHeight) || 20) + 10) + 'px, ' + g.bufferBg + ' ' + ((parseInt(g.gridLineHeight) || 20) + 10) + 'px) !important; }\n' +
      '* { scrollbar-color: ' + sb.thumb + ' ' + sb.track + '; }\n' +
      '::-webkit-scrollbar { width: 10px; background: ' + sb.track + '; }\n' +
      '::-webkit-scrollbar-thumb { background: ' + sb.thumb + '; border-radius: 4px; }\n' +
      '::-webkit-scrollbar-thumb:hover { background: ' + sb.thumbHover + '; }\n';
    document.head.appendChild(style);
    setTimeout(function() { window.dispatchEvent(new Event('resize')); }, 50);
  }

  function removePlatformTheme() {
    var el = document.getElementById('platform-theme-override');
    if (el) el.remove();
    setTimeout(function() { window.dispatchEvent(new Event('resize')); }, 50);
  }

  window.addEventListener('message', function(e) {
    if (!e.data) return;
    if (e.data.type === 'ifhub:applyTheme') {
      document.body.classList.add('platform-theme-active');
      applyPlatformTheme(e.data.game, e.data.scrollbar);
    }
    if (e.data.type === 'ifhub:restoreOverlay') {
      document.body.classList.remove('platform-theme-active');
      removePlatformTheme();
    }
  });

  // Auto-apply theme from URL param (full-page mode from hub)
  var urlTheme = new URLSearchParams(window.location.search).get('theme');
  if (urlTheme && urlTheme !== 'classic') {
    var s = document.createElement('script');
    s.src = '/ifhub/themes.js';
    s.onload = function() {
      var t = getTheme(urlTheme);
      if (t) {
        document.body.classList.add('platform-theme-active');
        applyPlatformTheme(t.game, t.scrollbar);
      }
    };
    document.head.appendChild(s);
  }
})();
</script>

</body>
</html>
