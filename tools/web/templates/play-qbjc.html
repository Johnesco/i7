<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>__TITLE__</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.min.css">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  background: #0a0a0a;
  color: #d4c5a9;
  font-family: Georgia, "Times New Roman", serif;
}

body {
  display: flex;
  flex-direction: column;
  align-items: center;
  height: 100vh;
  overflow: hidden;
}

.header {
  display: flex;
  align-items: baseline;
  gap: 12px;
  padding: 6px 12px;
  flex-shrink: 0;
}

.header h1 {
  font-size: 0.95em;
  color: #c4b48a;
  white-space: nowrap;
}

.header .version {
  font-size: 0.75em;
  color: #887755;
  font-style: italic;
  white-space: nowrap;
}

.header .back a {
  font-size: 0.75em;
  color: #887755;
  text-decoration: none;
  border-bottom: 1px solid #3a3020;
}

.header .back a:hover {
  color: #e8d090;
  border-bottom-color: #aa9966;
}

#terminal-container {
  flex: 1;
  width: 100%;
  min-height: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 8px;
}
</style>
</head>
<body>

<div class="header">
  <h1>__TITLE__</h1>
  <span class="version">__VERSION_LABEL__</span>
  <span class="back"><a href="__BACK_HREF__">&larr; Back</a></span>
</div>

<div id="terminal-container"></div>

<script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.min.js"></script>
<script src="__COMPILED_JS__"></script>
<script>
(function() {
  var term = new Terminal({
    theme: { background: '#0a0a0a', foreground: '#d4c5a9', cursor: '#e8d090' },
    fontFamily: '"Courier New", monospace',
    fontSize: 16,
    cursorBlink: true
  });
  var fitAddon = new FitAddon.FitAddon();
  term.loadAddon(fitAddon);
  term.open(document.getElementById('terminal-container'));
  fitAddon.fit();
  window.addEventListener('resize', function() { fitAddon.fit(); });

  /* qbjc runtime binds to the terminal via qbjc.run(term) */
  if (typeof qbjc !== 'undefined' && typeof qbjc.run === 'function') {
    qbjc.run(term);
  }
})();
</script>

</body>
</html>
