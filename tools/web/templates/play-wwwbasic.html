<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>__TITLE__</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  background: #0a0a0a;
  color: #d4c5a9;
  font-family: Georgia, "Times New Roman", serif;
}

body {
  display: flex;
  flex-direction: column;
  align-items: center;
  height: 100vh;
  overflow: hidden;
}

.header {
  display: flex;
  align-items: baseline;
  gap: 12px;
  padding: 6px 12px;
  flex-shrink: 0;
}

.header h1 {
  font-size: 0.95em;
  color: #c4b48a;
  white-space: nowrap;
}

.header .version {
  font-size: 0.75em;
  color: #887755;
  font-style: italic;
  white-space: nowrap;
}

.header .back a {
  font-size: 0.75em;
  color: #887755;
  text-decoration: none;
  border-bottom: 1px solid #3a3020;
}

.header .back a:hover {
  color: #e8d090;
  border-bottom-color: #aa9966;
}

/* wwwBASIC canvas scales to fill remaining space */
#basic-container {
  flex: 1;
  width: 100%;
  min-height: 0;
  display: flex;
  align-items: center;
  justify-content: center;
}

#basic-container canvas {
  display: block;
  max-width: 100%;
  max-height: 100%;
  image-rendering: pixelated;
}
</style>
</head>
<body>

<div class="header">
  <h1>__TITLE__</h1>
  <span class="version">__VERSION_LABEL__</span>
  <span class="back"><a href="__BACK_HREF__">&larr; Back</a></span>
</div>

<div id="basic-container"></div>

<script src="wwwbasic.js"></script>
<script type="text/basic">
__BASIC_SOURCE__
</script>

</body>
</html>
